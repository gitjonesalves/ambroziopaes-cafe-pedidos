<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sistema de Pedidos - Café">
    <meta name="theme-color" content="#8B4513">
    <title>Café - Sistema de Pedidos</title>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #8B4513;
            --primary-light: #A0522D;
            --primary-dark: #654321;
            --success: #2ecc71;
            --danger: #e74c3c;
            --warning: #f39c12;
            --dark: #2c3e50;
            --light: #ecf0f1;
            --text: #2c3e50;
            --border: #bdc3c7;
        }

        html, body {
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--light);
            color: var(--text);
        }

        .app-container {
            display: none;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .app-container.show {
            display: flex;
        }

        /* ============= AUTH ============= */
        .auth-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
        }

        .auth-card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            width: 90%;
            max-width: 400px;
            text-align: center;
        }

        .auth-card h1 {
            font-size: 32px;
            margin-bottom: 10px;
            color: var(--primary);
        }

        .auth-card p {
            color: #7f8c8d;
            margin-bottom: 30px;
        }

        .role-buttons {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }

        .role-btn {
            padding: 15px 20px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .role-btn.atendente {
            background: var(--primary);
            color: white;
        }

        .role-btn.atendente:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(139, 69, 19, 0.3);
        }

        .role-btn.cozinha {
            background: var(--warning);
            color: white;
        }

        .role-btn.cozinha:hover {
            background: #e67e22;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(243, 156, 18, 0.3);
        }

        .role-btn.relatorio {
            background: var(--primary-light);
            color: white;
        }

        .role-btn.relatorio:hover {
            background: var(--primary);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(139, 69, 19, 0.3);
        }

        /* ============= HEADER ============= */
        .header {
            background: var(--primary);
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .header-title {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .header-subtitle {
            font-size: 12px;
            opacity: 0.8;
        }

        .logout-btn {
            background: rgba(255,255,255,0.2);
            color: white;
            border: 1px solid rgba(255,255,255,0.4);
            padding: 8px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .logout-btn:hover {
            background: rgba(255,255,255,0.3);
        }

        /* ============= CONTENT ============= */
        .content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        /* ============= ATENDENTE INTERFACE ============= */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .menu-item {
            background: white;
            border: 2px solid var(--border);
            border-radius: 10px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }

        .menu-item:hover {
            border-color: var(--primary);
            box-shadow: 0 5px 15px rgba(139, 69, 19, 0.15);
            transform: translateY(-3px);
        }

        .menu-item.active {
            border-color: var(--primary);
            background: rgba(139, 69, 19, 0.05);
        }

        .menu-item-icon {
            font-size: 32px;
            margin-bottom: 8px;
        }

        .menu-item-name {
            font-weight: 600;
            font-size: 13px;
            margin-bottom: 5px;
        }

        .menu-item-price {
            color: var(--primary);
            font-weight: 700;
            font-size: 14px;
        }

        .menu-item-qty {
            margin-top: 8px;
            font-size: 11px;
            color: #7f8c8d;
        }

        /* ============= CARRINHO ============= */
        .cart-section {
            background: white;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .cart-title {
            font-weight: 700;
            margin-bottom: 15px;
            font-size: 16px;
        }

        .cart-items {
            margin-bottom: 15px;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            background: var(--light);
            border-radius: 6px;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .cart-item-name {
            flex: 1;
            font-weight: 500;
        }

        .cart-item-qty {
            background: var(--primary);
            color: white;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 12px;
            margin: 0 8px;
        }

        .cart-item-remove {
            background: var(--danger);
            color: white;
            border: none;
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s;
        }

        .cart-item-remove:hover {
            background: #c0392b;
        }

        .cart-summary {
            border-top: 2px solid var(--border);
            padding-top: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 700;
        }

        .cart-total {
            color: var(--primary);
            font-size: 18px;
        }

        .submit-btn {
            background: var(--success);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            font-size: 16px;
            transition: all 0.3s;
            width: 100%;
        }

        .submit-btn:hover {
            background: #27ae60;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(46, 204, 113, 0.3);
        }

        .submit-btn:disabled {
            background: #95a5a6;
            cursor: not-allowed;
            transform: none;
        }

        /* ============= COZINHA ============= */
        .kitchen-queue {
            display: grid;
            gap: 15px;
        }

        .order-card {
            background: white;
            border-left: 5px solid var(--warning);
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            transition: all 0.3s;
        }

        .order-card.pending {
            border-left-color: var(--danger);
            background: rgba(231, 76, 60, 0.02);
        }

        .order-card.ready {
            border-left-color: var(--success);
            background: rgba(46, 204, 113, 0.02);
        }

        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border);
        }

        .order-number {
            font-weight: 700;
            font-size: 18px;
            color: var(--primary);
        }

        .order-time {
            font-size: 12px;
            color: #7f8c8d;
        }

        .order-items {
            margin-bottom: 12px;
        }

        .order-item {
            padding: 8px 0;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .order-item-name {
            flex: 1;
        }

        .order-item-qty {
            background: var(--primary);
            color: white;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 11px;
        }

        .order-actions {
            display: flex;
            gap: 10px;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--border);
        }

        .ready-btn, .done-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: all 0.3s;
            text-transform: uppercase;
        }

        .ready-btn {
            background: var(--warning);
            color: white;
        }

        .ready-btn:hover {
            background: #e67e22;
        }

        .done-btn {
            background: var(--success);
            color: white;
        }

        .done-btn:hover {
            background: #27ae60;
        }

        /* ============= RELATÓRIO ============= */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            text-align: center;
        }

        .stat-label {
            color: #7f8c8d;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: var(--primary);
        }

        .sales-list {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .sales-list h3 {
            margin-bottom: 15px;
            font-size: 16px;
        }

        .sales-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
            font-size: 14px;
        }

        .sales-item:last-child {
            border-bottom: none;
        }

        .sales-qty {
            background: var(--light);
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: 600;
            margin-right: 10px;
        }

        .sales-price {
            color: var(--primary);
            font-weight: 700;
        }

        /* ============= RESPONSIVE ============= */
        @media (max-width: 768px) {
            .menu-grid {
                grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            }

            .header {
                padding: 12px 15px;
            }

            .header-title {
                font-size: 18px;
            }

            .content {
                padding: 15px;
            }
        }

        @media (max-width: 480px) {
            .menu-grid {
                grid-template-columns: repeat(3, 1fr);
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }

            .auth-card {
                padding: 30px 20px;
            }
        }

        /* ============= ANIMATIONS ============= */
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .menu-item, .cart-item, .order-card, .stat-card {
            animation: slideIn 0.3s ease-out;
        }

        .pulse {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        /* ============= TOAST ============= */
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--primary);
            color: white;
            padding: 15px 20px;
            border-radius: 8px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            animation: slideIn 0.3s ease-out;
            max-width: 300px;
            z-index: 1000;
        }

        .toast.success {
            background: var(--success);
        }

        .toast.error {
            background: var(--danger);
        }

        /* ============= HIDDEN ============= */
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <!-- AUTH SCREEN -->
    <div class="auth-screen" id="authScreen">
        <div class="auth-card">
            <h1>☕ Café</h1>
            <p>Sistema de Pedidos</p>
            <div class="role-buttons">
                <button class="role-btn atendente" onclick="selectRole('atendente')">👤 Atendente</button>
                <button class="role-btn cozinha" onclick="selectRole('cozinha')">👨‍🍳 Cozinha</button>
                <button class="role-btn relatorio" onclick="selectRole('relatorio')">📊 Relatório</button>
            </div>
        </div>
    </div>

    <!-- APP CONTAINER -->
    <div class="app-container" id="appContainer">
        <!-- HEADER -->
        <div class="header">
            <div>
                <div class="header-title">☕ Café - <span id="roleTitle"></span></div>
                <div class="header-subtitle" id="headerSubtitle"></div>
            </div>
            <button class="logout-btn" onclick="logout()">Sair</button>
        </div>

        <!-- CONTENT -->
        <div class="content">
            <!-- ATENDENTE -->
            <div id="atendentePanel" class="hidden">
                <div>
                    <h2 style="margin-bottom: 20px; color: var(--primary);">Cardápio</h2>
                    <div class="menu-grid" id="menuGrid"></div>
                </div>

                <div class="cart-section">
                    <div class="cart-title">🛒 Seu Pedido</div>
                    <div class="cart-items" id="cartItems">
                        <p style="color: #7f8c8d; text-align: center;">Selecione itens do cardápio</p>
                    </div>
                    <div class="cart-summary">
                        <span>Total:</span>
                        <span class="cart-total" id="cartTotal">R$ 0,00</span>
                    </div>
                    <button class="submit-btn" id="submitBtn" onclick="submitOrder()" disabled>Enviar Pedido</button>
                </div>
            </div>

            <!-- COZINHA -->
            <div id="cozinhaPanel" class="hidden">
                <h2 style="margin-bottom: 20px; color: var(--primary);">📋 Fila de Pedidos</h2>
                <div class="kitchen-queue" id="kitchenQueue">
                    <p style="color: #7f8c8d; text-align: center; padding: 40px 20px;">Nenhum pedido no momento</p>
                </div>
            </div>

            <!-- RELATÓRIO -->
            <div id="relatorioPanel" class="hidden">
                <h2 style="margin-bottom: 20px; color: var(--primary);">📊 Relatório de Vendas</h2>
                
                <div style="margin-bottom: 20px;">
                    <button class="submit-btn" onclick="resetSales()" style="background: var(--danger); width: auto; padding: 10px 20px;">🔄 Limpar Dados do Dia</button>
                </div>

                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-label">Total de Pedidos</div>
                        <div class="stat-value" id="totalOrders">0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Receita Total</div>
                        <div class="stat-value" id="totalRevenue">R$ 0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Ticket Médio</div>
                        <div class="stat-value" id="avgTicket">R$ 0</div>
                    </div>
                </div>

                <div class="sales-list">
                    <h3>Produtos Vendidos</h3>
                    <div id="salesList">
                        <p style="color: #7f8c8d;">Nenhuma venda registrada</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ============= CONFIG =============
		const firebaseConfig = {
		  apiKey: "AIzaSyAKZk82L4fx2hnvCskXcjIgiYnvEMdglWg",
		  authDomain: "ambroziopaes.firebaseapp.com",
		  databaseURL: "https://ambroziopaes-default-rtdb.firebaseio.com",
		  projectId: "ambroziopaes",
		  storageBucket: "ambroziopaes.firebasestorage.app",
		  messagingSenderId: "237755790666",
		  appId: "1:237755790666:web:5bc2ffabf6631e6a2dfdb3",
		  measurementId: "G-RJ478LM1V8"
		};

        // ============= STATE =============
        let currentRole = null;
        let cart = {};
        let db = null;
        let orders = {};
        let salesData = {};

        // ============= MENU =============
        const MENU = {
            'café': [
                { name: 'Café Coado', icon: '☕', price: 5.00 },
                { name: 'Espresso', icon: '☕', price: 6.00 },
                { name: 'Cappuccino', icon: '🥛', price: 8.00 },
                { name: 'Latte', icon: '🥛', price: 8.50 },
                { name: 'Café com Leite', icon: '☕', price: 6.00 },
            ],
            'bebidas': [
                { name: 'Suco Natural', icon: '🧃', price: 7.00 },
                { name: 'Açaí', icon: '🍇', price: 12.00 },
                { name: 'Vitamina', icon: '🥤', price: 10.00 },
                { name: 'Água', icon: '💧', price: 2.00 },
                { name: 'Refrigerante', icon: '🥤', price: 5.00 },
            ],
            'salgados': [
                { name: 'Croissant', icon: '🥐', price: 8.00 },
                { name: 'Pão de Queijo', icon: '🥖', price: 5.00 },
                { name: 'Bolo Salgado', icon: '🍰', price: 6.00 },
                { name: 'Sanduíche Natural', icon: '🥪', price: 10.00 },
                { name: 'Pastel', icon: '🥟', price: 7.00 },
            ],
            'doces': [
                { name: 'Bolo de Chocolate', icon: '🍰', price: 6.00 },
                { name: 'Brownie', icon: '🍫', price: 7.00 },
                { name: 'Torta de Frutas', icon: '🍪', price: 8.00 },
                { name: 'Biscoito Doce', icon: '🍪', price: 4.00 },
                { name: 'Pudim', icon: '🍮', price: 6.00 },
            ],
        };

        // ============= FIREBASE INIT =============
        function initFirebase() {
            try {
                firebase.initializeApp(firebaseConfig);
                db = firebase.database();
                
                // Listener de pedidos
                db.ref('orders').on('value', (snapshot) => {
                    orders = snapshot.val() || {};
                    if (currentRole === 'cozinha') renderKitchen();
                });

                // Listener de vendas
                db.ref('sales').on('value', (snapshot) => {
                    salesData = snapshot.val() || {};
                    if (currentRole === 'relatorio') renderReport();
                });

            } catch (error) {
                console.error('Firebase init error:', error);
                showToast('Erro ao conectar com Firebase. Usando modo offline.', 'error');
                useLocalMode();
            }
        }

        // ============= AUTH =============
        function selectRole(role) {
            currentRole = role;
            document.getElementById('authScreen').style.display = 'none';
            document.getElementById('appContainer').classList.add('show');
            
            document.getElementById('roleTitle').textContent = 
                role === 'atendente' ? '👤 Atendente' :
                role === 'cozinha' ? '👨‍🍳 Cozinha' : '📊 Relatório';

            initFirebase();

            if (role === 'atendente') {
                renderMenu();
                document.getElementById('atendentePanel').classList.remove('hidden');
                document.getElementById('headerSubtitle').textContent = 'Novo pedido';
            } else if (role === 'cozinha') {
                document.getElementById('cozinhaPanel').classList.remove('hidden');
                document.getElementById('headerSubtitle').textContent = 'Pedidos em tempo real';
                renderKitchen();
            } else {
                document.getElementById('relatorioPanel').classList.remove('hidden');
                document.getElementById('headerSubtitle').textContent = 'Vendas do dia';
                renderReport();
            }
        }

        function logout() {
            currentRole = null;
            cart = {};
            document.getElementById('authScreen').style.display = 'flex';
            document.getElementById('appContainer').classList.remove('show');
            document.querySelectorAll('[id$="Panel"]').forEach(el => el.classList.add('hidden'));
        }

        // ============= ATENDENTE =============
        function renderMenu() {
            const grid = document.getElementById('menuGrid');
            grid.innerHTML = '';

            Object.entries(MENU).forEach(([category, items]) => {
                items.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'menu-item';
                    div.onclick = () => addToCart(item);
                    div.innerHTML = `
                        <div class="menu-item-icon">${item.icon}</div>
                        <div class="menu-item-name">${item.name}</div>
                        <div class="menu-item-price">R$ ${item.price.toFixed(2)}</div>
                        <div class="menu-item-qty" id="qty-${item.name}"></div>
                    `;
                    grid.appendChild(div);
                });
            });

            renderCart();
        }

        function addToCart(item) {
            const key = item.name;
            if (!cart[key]) {
                cart[key] = { ...item, quantity: 0 };
            }
            cart[key].quantity++;
            renderCart();
        }

        function renderCart() {
            const cartItems = document.getElementById('cartItems');
            const submitBtn = document.getElementById('submitBtn');
            const items = Object.values(cart).filter(item => item.quantity > 0);

            // Atualizar quantidade no menu
            Object.keys(cart).forEach(key => {
                const qty = cart[key].quantity;
                const el = document.getElementById(`qty-${key}`);
                if (el) {
                    el.textContent = qty > 0 ? `${qty}x` : '';
                }
            });

            if (items.length === 0) {
                cartItems.innerHTML = '<p style="color: #7f8c8d; text-align: center;">Selecione itens do cardápio</p>';
                submitBtn.disabled = true;
                document.getElementById('cartTotal').textContent = 'R$ 0,00';
                return;
            }

            let total = 0;
            cartItems.innerHTML = items.map(item => {
                const subtotal = item.price * item.quantity;
                total += subtotal;
                return `
                    <div class="cart-item">
                        <span class="cart-item-name">${item.name}</span>
                        <span class="cart-item-qty">${item.quantity}</span>
                        <button class="cart-item-remove" onclick="removeFromCart('${item.name}')">✕</button>
                    </div>
                `;
            }).join('');

            document.getElementById('cartTotal').textContent = `R$ ${total.toFixed(2)}`;
            submitBtn.disabled = false;
        }

        function removeFromCart(name) {
            delete cart[name];
            renderCart();
        }

        function submitOrder() {
            const items = Object.values(cart).filter(item => item.quantity > 0);
            if (items.length === 0) return;

            const orderId = Date.now().toString();
            const total = items.reduce((sum, item) => sum + (item.price * item.quantity), 0);

            const orderData = {
                id: orderId,
                items: items.map(item => ({ name: item.name, quantity: item.quantity, price: item.price })),
                total: total,
                status: 'pending',
                createdAt: new Date().toLocaleTimeString('pt-BR'),
                timestamp: Date.now()
            };

            // Salvar pedido no Firebase
            if (db) {
                db.ref(`orders/${orderId}`).set(orderData);
            }

            // Registrar venda
            if (db) {
                items.forEach(item => {
                    const saleKey = item.name;
                    db.ref(`sales/${saleKey}`).transaction(current => {
                        return {
                            qty: (current?.qty || 0) + item.quantity,
                            total: (current?.total || 0) + (item.price * item.quantity),
                            price: item.price
                        };
                    });
                });
            }

            showToast(`Pedido #${orderId} enviado à cozinha!`, 'success');
            cart = {};
            renderCart();
        }

        // ============= COZINHA =============
        function renderKitchen() {
            const queue = document.getElementById('kitchenQueue');
            const pending = Object.values(orders)
                .filter(o => o.status !== 'done')
                .sort((a, b) => a.timestamp - b.timestamp);

            if (pending.length === 0) {
                queue.innerHTML = '<p style="color: #7f8c8d; text-align: center; padding: 40px 20px;">Nenhum pedido no momento</p>';
                return;
            }

            queue.innerHTML = pending.map(order => `
                <div class="order-card ${order.status}">
                    <div class="order-header">
                        <div class="order-number">Pedido #${order.id.slice(-4)}</div>
                        <div class="order-time">${order.createdAt}</div>
                    </div>
                    <div class="order-items">
                        ${order.items.map(item => `
                            <div class="order-item">
                                <span class="order-item-name">${item.name}</span>
                                <span class="order-item-qty">${item.quantity}</span>
                            </div>
                        `).join('')}
                    </div>
                    <div class="order-actions">
                        ${order.status === 'pending' ? `
                            <button class="ready-btn" onclick="updateOrder('${order.id}', 'ready')">Pronto</button>
                        ` : `
                            <button class="done-btn" onclick="updateOrder('${order.id}', 'done')">Entregue</button>
                        `}
                    </div>
                </div>
            `).join('');
        }

        function updateOrder(orderId, status) {
            if (db) {
                db.ref(`orders/${orderId}/status`).set(status);
            }
            showToast(`Pedido marcado como ${status === 'ready' ? 'pronto' : 'entregue'}`, 'success');
        }

        // ============= RELATÓRIO =============
        function renderReport() {
            const sales = Object.entries(salesData);
            const totalOrders = Object.values(orders).filter(o => o.status === 'done').length;
            const totalRevenue = sales.reduce((sum, [_, data]) => sum + (data.total || 0), 0);
            const avgTicket = totalOrders > 0 ? totalRevenue / totalOrders : 0;

            document.getElementById('totalOrders').textContent = totalOrders;
            document.getElementById('totalRevenue').textContent = `R$ ${totalRevenue.toFixed(2)}`;
            document.getElementById('avgTicket').textContent = `R$ ${avgTicket.toFixed(2)}`;

            const salesList = document.getElementById('salesList');
            if (sales.length === 0) {
                salesList.innerHTML = '<p style="color: #7f8c8d;">Nenhuma venda registrada</p>';
                return;
            }

            salesList.innerHTML = sales
                .sort((a, b) => b[1].qty - a[1].qty)
                .map(([name, data]) => `
                    <div class="sales-item">
                        <div>
                            <span class="sales-qty">${data.qty}x</span>
                            ${name}
                        </div>
                        <div class="sales-price">R$ ${data.total.toFixed(2)}</div>
                    </div>
                `).join('');
        }

        function resetSales() {
            if (confirm('Limpar todos os dados de vendas?')) {
                if (db) {
                    db.ref('sales').set({});
                    db.ref('orders').set({});
                }
                showToast('Dados limpos!', 'success');
            }
        }

        // ============= HELPERS =============
        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function useLocalMode() {
            console.log('Modo offline ativado');
        }

        // ============= INIT =============
        window.addEventListener('load', () => {
            document.getElementById('authScreen').style.display = 'flex';
        });
    </script>
</body>
</html>
