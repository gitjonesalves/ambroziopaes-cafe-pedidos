<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👤 Atendente - Ambrózio Paes</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='75' font-size='75'>👤</text></svg>">

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/responsive.css">

    <style>
        /* Atendente específico */
        .menu-section {
          margin-bottom: 40px;
        }

        .menu-section h3 {
          display: flex;
          align-items: center;
          gap: 10px;
          margin-bottom: 20px;
          padding-bottom: 10px;
          border-bottom: 2px solid var(--accent);
        }

        .menu-grid {
          display: grid;
          grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
          gap: 15px;
          margin-bottom: 30px;
        }

        .menu-item {
          background: white;
          border: 2px solid var(--border);
          border-radius: 12px;
          padding: 15px;
          text-align: center;
          cursor: pointer;
          transition: all 0.3s ease;
        }

        .menu-item:hover {
          border-color: var(--accent);
          box-shadow: 0 6px 18px rgba(212, 175, 55, 0.2);
          transform: translateY(-3px);
        }

        .menu-item .icon {
          font-size: 32px;
          margin-bottom: 10px;
          display: block;
        }

        .menu-item .name {
          font-weight: 600;
          color: var(--primary);
          font-size: 14px;
          margin-bottom: 5px;
        }

        .menu-item .description {
          font-size: 11px;
          color: #888;
          margin-bottom: 10px;
          min-height: 22px;
        }

        .menu-item .badges {
          display: flex;
          flex-wrap: wrap;
          gap: 4px;
          justify-content: center;
          margin-bottom: 10px;
          min-height: 20px;
        }

        .menu-item .price {
          font-size: 16px;
          font-weight: 700;
          color: var(--accent);
          margin-bottom: 10px;
        }

        .menu-item .qty-display {
          display: inline-block;
          background: var(--success);
          color: white;
          padding: 4px 8px;
          border-radius: 20px;
          font-size: 12px;
          font-weight: 600;
          margin-top: 5px;
          min-width: 25px;
        }

        /* Sidebar Carrinho */
        .cart-sidebar {
          position: fixed;
          right: 0;
          top: 70px;
          width: 300px;
          height: calc(100vh - 70px);
          background: white;
          border-left: 2px solid var(--border);
          box-shadow: -4px 0 12px rgba(0, 0, 0, 0.1);
          overflow-y: auto;
          padding: 20px;
          z-index: 50;
          transform: translateX(0);
          transition: transform 0.3s ease;
        }

        .cart-sidebar.hidden {
          transform: translateX(100%);
        }

        .cart-header {
          display: flex;
          justify-content: space-between;
          align-items: center;
          margin-bottom: 20px;
          padding-bottom: 15px;
          border-bottom: 2px solid var(--border);
        }

        .cart-header h3 {
          margin: 0;
          font-size: 18px;
        }

        .cart-close-btn {
          background: none;
          border: none;
          font-size: 20px;
          cursor: pointer;
          color: var(--primary);
        }

        .cart-form {
          margin-bottom: 20px;
          padding-bottom: 20px;
          border-bottom: 2px solid var(--border);
        }

        .cart-form .form-group {
          margin-bottom: 10px;
        }

        .cart-form .form-group label {
          font-size: 12px;
          margin-bottom: 5px;
        }

        .cart-form .form-group input {
          padding: 8px;
          font-size: 13px;
        }

        .cart-items {
          margin-bottom: 20px;
          max-height: calc(100vh - 400px);
          overflow-y: auto;
        }

        .cart-item {
          display: flex;
          justify-content: space-between;
          align-items: center;
          padding: 10px 0;
          border-bottom: 1px solid var(--bg-secondary);
          font-size: 13px;
        }

        .cart-item-info {
          flex: 1;
        }

        .cart-item-name {
          font-weight: 600;
          color: var(--primary);
          margin-bottom: 3px;
        }

        .cart-item-price {
          color: #888;
          font-size: 12px;
        }

        .cart-item-qty {
          display: flex;
          align-items: center;
          gap: 5px;
          margin-right: 10px;
        }

        .qty-btn {
          background: var(--light);
          border: 1px solid var(--border);
          width: 24px;
          height: 24px;
          border-radius: 4px;
          cursor: pointer;
          font-weight: 600;
          font-size: 12px;
          color: var(--primary);
        }

        .qty-btn:hover {
          background: var(--accent);
          color: white;
        }

        .cart-item-remove {
          background: none;
          border: none;
          color: var(--danger);
          cursor: pointer;
          font-size: 16px;
        }

        .cart-empty {
          text-align: center;
          color: #888;
          padding: 40px 0;
        }

        .cart-summary {
          margin-bottom: 20px;
          padding: 15px;
          background: var(--light);
          border-radius: 8px;
        }

        .cart-total {
          display: flex;
          justify-content: space-between;
          align-items: center;
          margin-bottom: 10px;
          font-weight: 600;
        }

        .cart-total-amount {
          font-size: 20px;
          color: var(--accent);
        }

        .cart-submit {
          width: 100%;
          margin-bottom: 10px;
        }

        /* Toggle Cart Button (Mobile) */
        .toggle-cart-btn {
          position: fixed;
          bottom: 20px;
          right: 20px;
          width: 60px;
          height: 60px;
          border-radius: 50%;
          background: var(--accent);
          color: var(--primary);
          border: none;
          font-size: 24px;
          cursor: pointer;
          box-shadow: 0 4px 12px rgba(212, 175, 55, 0.3);
          display: none;
          z-index: 40;
          transition: all 0.3s;
        }

        .toggle-cart-btn:hover {
          transform: scale(1.1);
        }

        .toggle-cart-btn .badge {
          position: absolute;
          top: -5px;
          right: -5px;
          background: var(--danger);
          color: white;
          width: 24px;
          height: 24px;
          border-radius: 50%;
          display: flex;
          align-items: center;
          justify-content: center;
          font-size: 12px;
          font-weight: 700;
        }

        @media (max-width: 900px) {
          .cart-sidebar {
            width: 280px;
          }

          .menu-grid {
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
          }
        }

        @media (max-width: 768px) {
          .cart-sidebar {
            width: 100%;
            top: 0;
            height: 100%;
            border-left: none;
            border-top: 2px solid var(--border);
          }

          .cart-sidebar.hidden {
            transform: translateY(100%);
          }

          .toggle-cart-btn {
            display: flex;
            align-items: center;
            justify-content: center;
          }

          .container {
            padding-right: 0;
          }

          .menu-grid {
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 10px;
          }
        }

        @media (max-width: 640px) {
          .menu-grid {
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
          }

          .menu-item {
            padding: 10px;
          }

          .menu-item .icon {
            font-size: 24px;
            margin-bottom: 5px;
          }

          .menu-item .name {
            font-size: 12px;
          }

          .menu-item .description {
            font-size: 10px;
          }

          .menu-item .price {
            font-size: 14px;
          }
        }
    </style>
</head>
<body>
<!-- Header -->
<header class="header">
    <div class="header-content">
        <span class="logo">☕ Ambrózio Paes - 👤 Atendente</span>
        <div class="header-actions">
            <a href="index.html" class="home-link">🏠 Início</a>
            <button id="logoutBtn" class="home-link">🚪 Sair</button>
        </div>
    </div>
</header>

<!-- Main Content -->
<div class="container">
    <h1>📋 Faça seus Pedidos</h1>
    <p style="color: #666; margin-bottom: 30px;">Clique nos itens para adicionar ao carrinho</p>

    <!-- Menu dinamicamente carregado -->
    <div id="menuContainer"></div>
</div>

<!-- Cart Sidebar -->
<div class="cart-sidebar" id="cartSidebar">
    <div class="cart-header">
        <h3>🛒 Seu Pedido</h3>
        <button class="cart-close-btn" onclick="toggleCart()">✕</button>
    </div>

    <!-- Client Info Form -->
    <div class="cart-form">
        <div class="form-group">
            <label for="clientInfo">Mesa ou Nome:</label>
            <input
                    type="text"
                    id="clientInfo"
                    placeholder="Mesa 5 ou João Silva"
                    maxlength="50"
            >
        </div>
    </div>

    <!-- Items -->
    <div id="cartItems" class="cart-items">
        <div class="cart-empty">Nenhum item selecionado</div>
    </div>

    <!-- Summary -->
    <div class="cart-summary">
        <div class="cart-total">
            <span>Total:</span>
            <span class="cart-total-amount" id="cartTotal">R$ 0,00</span>
        </div>
    </div>

    <!-- Buttons -->
    <button
            id="submitOrderBtn"
            class="btn btn-primary cart-submit"
            onclick="submitOrder()"
            disabled
    >
        ✓ Enviar Pedido
    </button>

    <button
            id="clearCartBtn"
            class="btn btn-ghost cart-submit"
            onclick="clearCart()"
    >
        🗑 Limpar
    </button>
</div>

<!-- Toggle Cart Button (Mobile) -->
<button id="toggleCartBtn" class="toggle-cart-btn" onclick="toggleCart()">
    🛒
    <span class="badge" id="cartBadge" style="display: none;">0</span>
</button>

<!-- Toast Container -->
<div id="toast-container"></div>

<!-- Modal de Confirmação -->
<div id="confirmModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2>Confirmar Pedido</h2>
        </div>
        <div class="modal-body" id="confirmModalBody"></div>
        <div class="modal-footer">
            <button class="btn btn-ghost" onclick="closeConfirmModal()">Cancelar</button>
            <button class="btn btn-primary" onclick="confirmSubmitOrder()">Confirmar</button>
        </div>
    </div>
</div>

<!-- Scripts -->
<script src="config/env.js"></script>
<script src="js/utils.js"></script>
<script src="js/toast.js"></script>
<script type="module">
    import { db, setupConnectionListener } from './js/firebase-init.js';
    import { showToast, showSuccess, showError } from './js/toast.js';
    import { getStorage, setStorage, formatCurrency, sanitize, generateId } from './js/utils.js';
    import { loadMenu, submitOrder as dbSubmitOrder } from './js/db.js';

    // State
    let attendantId = null;
    let cart = [];
    let menu = [];
    let isSubmitting = false;

    // Initialize
    document.addEventListener('DOMContentLoaded', async () => {
      setupConnectionListener(onConnectionChange);

      // Verificar sessão
      const session = getStorage('session');
      if (!session || session.role !== 'atendente') {
        // Pedir nome do atendente
        const name = prompt('Digite seu nome para acessar:');
        if (!name) {
          window.location.href = 'index.html';
          return;
        }

        const newSession = {
          sessionId: generateId(),
          userId: name,
          role: 'atendente',
          userName: name,
          loginTime: new Date().toISOString(),
          expiresAt: new Date(Date.now() + 8 * 60 * 60 * 1000).toISOString()
        };

        setStorage('session', newSession);
      }

      const currentSession = getStorage('session');
      attendantId = currentSession.userId;

      // Carregar menu
      try {
        menu = await loadMenu();
        renderMenu();
        restoreCart();
      } catch (error) {
        console.error('Erro ao carregar menu:', error);
        showError('Erro ao carregar menu');
      }
    });

    // Render Menu
    window.renderMenu = function() {
      const container = document.getElementById('menuContainer');
      let html = '';

      const categories = {};
      menu.forEach(item => {
        if (!categories[item.categoria]) {
          categories[item.categoria] = [];
        }
        categories[item.categoria].push(item);
      });

      for (const [categoria, items] of Object.entries(categories)) {
        html += `<div class="menu-section">
          <h3>${categoria}</h3>
          <div class="menu-grid">
            ${items.map(item => `
              <div class="menu-item" onclick="addToCart('${item.id}', '${sanitize(item.nome)}', ${item.preco})">
                <span class="icon">${item.emoji || '☕'}</span>
                <div class="name">${sanitize(item.nome)}</div>
                <div class="description">${sanitize(item.descricao || '')}</div>
                <div class="badges">
                  ${item.acucar ? '<span class="badge badge-danger">🍬 Açúcar</span>' : '<span class="badge badge-success">0️⃣ S/ Açúcar</span>'}
                  ${item.lactose ? '<span class="badge badge-danger">🥛 Lactose</span>' : '<span class="badge badge-success">🌱 S/ Lactose</span>'}
                </div>
                <div class="price">${formatCurrency(item.preco)}</div>
                ${getCartQty(item.id) > 0 ? `<div class="qty-display">${getCartQty(item.id)}x</div>` : ''}
              </div>
            `).join('')}
          </div>
        </div>`;
      }

      container.innerHTML = html;
    };

    // Cart Functions
    window.addToCart = function(itemId, itemName, price) {
      const existingItem = cart.find(item => item.id === itemId);

      if (existingItem) {
        existingItem.qty += 1;
      } else {
        cart.push({
          id: itemId,
          nome: itemName,
          preco: price,
          qty: 1
        });
      }

      updateCart();
      saveCart();

      if (window.innerWidth < 768) {
        showCart();
      }
    };

    window.getCartQty = function(itemId) {
      const item = cart.find(i => i.id === itemId);
      return item ? item.qty : 0;
    };

    window.updateCart = function() {
      const cartItemsDiv = document.getElementById('cartItems');
      const submitBtn = document.getElementById('submitOrderBtn');
      const clientInfo = document.getElementById('clientInfo').value.trim();
      const cartBadge = document.getElementById('cartBadge');

      if (cart.length === 0) {
        cartItemsDiv.innerHTML = '<div class="cart-empty">Nenhum item selecionado</div>';
        submitBtn.disabled = true;
        cartBadge.style.display = 'none';
        return;
      }

      // Update badge
      cartBadge.textContent = cart.reduce((sum, item) => sum + item.qty, 0);
      cartBadge.style.display = 'flex';

      // Render items
      cartItemsDiv.innerHTML = cart.map(item => `
        <div class="cart-item">
          <div class="cart-item-info">
            <div class="cart-item-name">${sanitize(item.nome)}</div>
            <div class="cart-item-price">${formatCurrency(item.preco)}</div>
          </div>
          <div class="cart-item-qty">
            <button class="qty-btn" onclick="decreaseQty('${item.id}')">−</button>
            <span style="min-width: 20px; text-align: center;">${item.qty}</span>
            <button class="qty-btn" onclick="increaseQty('${item.id}')">+</button>
          </div>
          <button class="cart-item-remove" onclick="removeFromCart('${item.id}')">✕</button>
        </div>
      `).join('');

      // Update total
      const total = cart.reduce((sum, item) => sum + (item.preco * item.qty), 0);
      document.getElementById('cartTotal').textContent = formatCurrency(total);

      // Enable/disable submit button
      submitBtn.disabled = cart.length === 0 || !clientInfo;
    };

    window.increaseQty = function(itemId) {
      const item = cart.find(i => i.id === itemId);
      if (item) {
        item.qty += 1;
        updateCart();
        saveCart();
        renderMenu();
      }
    };

    window.decreaseQty = function(itemId) {
      const item = cart.find(i => i.id === itemId);
      if (item && item.qty > 1) {
        item.qty -= 1;
        updateCart();
        saveCart();
        renderMenu();
      } else {
        removeFromCart(itemId);
      }
    };

    window.removeFromCart = function(itemId) {
      cart = cart.filter(item => item.id !== itemId);
      updateCart();
      saveCart();
      renderMenu();
    };

    window.clearCart = function() {
      if (confirm('Limpar todo o carrinho?')) {
        cart = [];
        updateCart();
        saveCart();
        renderMenu();
        showSuccess('Carrinho limpo');
      }
    };

    function saveCart() {
      setStorage('cart', cart);
    }

    function restoreCart() {
      const saved = getStorage('cart', []);
      if (saved.length > 0) {
        cart = saved;
        updateCart();
        renderMenu();
      }
    }

    // Validar clientInfo
    document.getElementById('clientInfo').addEventListener('change', updateCart);
    document.getElementById('clientInfo').addEventListener('keyup', updateCart);

    // Submit Order
    window.submitOrder = function() {
      const clientInfo = document.getElementById('clientInfo').value.trim();

      if (!clientInfo) {
        showError('Digite mesa ou nome do cliente');
        return;
      }

      if (cart.length === 0) {
        showError('Adicione itens ao pedido');
        return;
      }

      // Show confirmation modal
      const modalBody = document.getElementById('confirmModalBody');
      const total = cart.reduce((sum, item) => sum + (item.preco * item.qty), 0);

      modalBody.innerHTML = `
        <p><strong>Mesa/Cliente:</strong> ${sanitize(clientInfo)}</p>
        <p><strong>Itens:</strong></p>
        <ul style="margin-left: 20px;">
          ${cart.map(item => `<li>${item.qty}x ${sanitize(item.nome)} - ${formatCurrency(item.preco * item.qty)}</li>`).join('')}
        </ul>
        <p style="margin-top: 15px; border-top: 2px solid var(--border); padding-top: 15px;">
          <strong>Total: ${formatCurrency(total)}</strong>
        </p>
      `;

      document.getElementById('confirmModal').classList.add('active');
    };

    window.closeConfirmModal = function() {
      document.getElementById('confirmModal').classList.remove('active');
    };

    window.confirmSubmitOrder = async function() {
      if (isSubmitting) return;

      isSubmitting = true;
      closeConfirmModal();

      try {
        const clientInfo = document.getElementById('clientInfo').value.trim();
        const orderId = await dbSubmitOrder(
          clientInfo,
          attendantId,
          cart
        );

        cart = [];
        document.getElementById('clientInfo').value = '';
        updateCart();
        renderMenu();
        saveCart();

        showSuccess(`✅ Pedido enviado! #${orderId.slice(0, 6)}`);
      } catch (error) {
        console.error('Erro ao enviar pedido:', error);
        showError('Erro ao enviar pedido. Tente novamente.');
      } finally {
        isSubmitting = false;
      }
    };

    // Toggle Cart
    window.toggleCart = function() {
      const sidebar = document.getElementById('cartSidebar');
      sidebar.classList.toggle('hidden');
    };

    function showCart() {
      const sidebar = document.getElementById('cartSidebar');
      sidebar.classList.remove('hidden');
    }

    // Logout
    document.getElementById('logoutBtn').addEventListener('click', () => {
      if (confirm('Sair do sistema?')) {
        setStorage('session', null);
        setStorage('cart', null);
        window.location.href = 'index.html';
      }
    });

    // Connection handler
    function onConnectionChange(isConnected) {
      console.log(isConnected ? '✅ Conectado' : '❌ Offline');
    }
</script>
</body>
</html>
